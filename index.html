<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#040c1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Sigue en tiempo real los trenes de Cercanías Renfe en España">
    
    <title>TuCercanías — Tiempo Real</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="app">
        <div id="map"></div>

        <div class="ui-overlay">
            
            <div id="alertsHome"></div>

            <div id="vehiclesHome"></div>

            <div id="pwaBanner"></div>
        </div>

        <nav class="nav-bar">
            <button class="nav-item active" onclick="showSection('home')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Inicio</span>
            </button>
            <button class="nav-item" onclick="showSection('routes')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                <span>Líneas</span>
            </button>
            <button class="nav-item" onclick="showSection('trains')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M7 21v-4m10 4v-4M2 11h20"/></svg>
                <span>Trenes</span>
            </button>
            <button class="nav-item" onclick="showSection('alerts')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>Avisos</span>
                <span id="abadge" class="badge" style="display:none">0</span>
            </button>
        </nav>
    </div>

    <div id="modal-routes" class="modal">
        <div class="modal-header">
            <h2>Líneas de Cercanías</h2>
            <button class="close-btn" onclick="hideModals()">✕</button>
        </div>
        <div class="modal-content">
            <div id="routesList"></div>
        </div>
    </div>

    <div id="modal-trains" class="modal">
        <div class="modal-header">
            <h2>Trenes en circulación</h2>
            <button class="close-btn" onclick="hideModals()">✕</button>
        </div>
        <div class="modal-content">
            <div id="vehiclesList"></div>
        </div>
    </div>

    <div id="modal-alerts" class="modal">
        <div class="modal-header">
            <h2>Avisos de servicio</h2>
            <button class="close-btn" onclick="hideModals()">✕</button>
        </div>
        <div class="modal-content">
            <div id="alertsFull"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
